version: '3.8'

services:
  # 1. The NestJS Backend API
  api:
    container_name: rooeel-api
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped
    networks:
      - rooeel-network

  # 2. PostgreSQL Database
  postgres:
    container_name: rooeel-postgres
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=rooeel
      - POSTGRES_PASSWORD=rooeel_pass
      - POSTGRES_DB=rooeel_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - rooeel-network

  # 3. Redis Cache
  redis:
    container_name: rooeel-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - rooeel-network

  # 4. MinIO (S3 Compatible Storage for PDFs)
  minio:
    container_name: rooeel-minio
    image: minio/minio
    ports:
      - "9000:9000" # API Port
      - "9001:9001" # Web Console Port
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped
    networks:
      - rooeel-network

  # 5. MinIO Setup (Automatically creates your 'rooeel' bucket on startup)
  minio-setup:
    container_name: rooeel-minio-setup
    image: minio/mc
    depends_on:
      - minio
    networks:
      - rooeel-network
    entrypoint: >
      /bin/sh -c " sleep 5; mc alias set myminio http://minio:9000 minioadmin minioadmin123; mc mb myminio/rooeel || true; mc anonymous set public myminio/rooeel; exit 0; "

volumes:
  pgdata:
  redisdata:
  miniodata:
    # New persistent volume for your PDFs

networks:
  rooeel-network:
    driver: bridge
