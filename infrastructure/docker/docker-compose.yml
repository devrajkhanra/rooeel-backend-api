# docker-compose.yml — DEVELOPMENT
# Usage: docker-compose up --build
# Hot-reload via volume mount, Prisma migrations auto-applied on startup.

version: '3.9'

services:
  # ── NestJS API (development, hot-reload) ──────────────────────────────────
  api:
    container_name: rooeel-api-dev
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile
      target: development          # <-- uses the 'development' stage
    ports:
      - "5000:5000"
    env_file:
      - ../../.env
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://rooeel:rooeel_pass@postgres:5432/rooeel_db
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
    volumes:
      - ../../src:/app/src         # Hot-reload: mounts your local src/
      - ../../.env:/app/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - rooeel-network
    command: >
      sh -c "(npx prisma migrate deploy --schema=src/prisma/schema.prisma || npx prisma db push --schema=src/prisma/schema.prisma) && npm run start:dev"

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    container_name: rooeel-postgres
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rooeel
      POSTGRES_PASSWORD: rooeel_pass
      POSTGRES_DB: rooeel_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rooeel -d rooeel_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - rooeel-network

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    container_name: rooeel-redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-rooeel_redis}
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - rooeel-network

  # ── MinIO ──────────────────────────────────────────────────────────────────
  minio:
    container_name: rooeel-minio
    image: minio/minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console → http://localhost:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    restart: unless-stopped
    networks:
      - rooeel-network

  # ── MinIO bucket setup (runs once) ────────────────────────────────────────
  minio-setup:
    container_name: rooeel-minio-setup
    image: minio/mc
    depends_on:
      - minio
    networks:
      - rooeel-network
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
        mc mb myminio/${MINIO_BUCKET:-rooeel} || true;
        mc anonymous set public myminio/${MINIO_BUCKET:-rooeel};
        exit 0;
      "

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  rooeel-network:
    driver: bridge
