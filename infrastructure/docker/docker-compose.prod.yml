# docker-compose.prod.yml — PRODUCTION
# Usage: docker-compose -f infrastructure/docker/docker-compose.prod.yml up --build -d
# Uses the lean 'production' stage from the Dockerfile.

version: '3.9'

services:
  # ── NestJS API (production build) ─────────────────────────────────────────
  api:
    container_name: rooeel-api
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile
      target: production           # <-- lean production stage
    ports:
      - "5000:5000"
    env_file:
      - ../../.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://rooeel:${POSTGRES_PASSWORD}@postgres:5432/rooeel_db
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - MINIO_ENDPOINT=minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: always
    networks:
      - rooeel-network
    command: >
      sh -c "npx prisma migrate deploy --schema=src/prisma/schema.prisma && node dist/main"

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    container_name: rooeel-postgres
    image: postgres:15-alpine
    expose:
      - "5432"            # Not exposed to host in production
    environment:
      POSTGRES_USER: rooeel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: rooeel_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rooeel -d rooeel_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always
    networks:
      - rooeel-network

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    container_name: rooeel-redis
    image: redis:7-alpine
    expose:
      - "6379"            # Not exposed to host in production
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    restart: always
    networks:
      - rooeel-network

  # ── MinIO ──────────────────────────────────────────────────────────────────
  minio:
    container_name: rooeel-minio
    image: minio/minio
    expose:
      - "9000"
    ports:
      - "9001:9001"       # Console only — use reverse proxy for S3 API in prod
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    restart: always
    networks:
      - rooeel-network

  # ── MinIO bucket setup ────────────────────────────────────────────────────
  minio-setup:
    container_name: rooeel-minio-setup
    image: minio/mc
    depends_on:
      - minio
    networks:
      - rooeel-network
    entrypoint: >
      /bin/sh -c "
        sleep 5;
        mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb myminio/${MINIO_BUCKET:-rooeel} || true;
        exit 0;
      "

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  rooeel-network:
    driver: bridge
